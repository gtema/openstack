openapi: 3.1.0
info:
  title: openstack-keystone
  description: OpenStack Keystone service
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  version: 4.0.1
paths:
  /:
    get:
      tags:
      - version
      summary: Version discovery endpoint.
      description: Version discovery
      operationId: version
      responses:
        '200':
          description: Versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Versions'
  /v3:
    get:
      tags:
      - version
      summary: Version discovery endpoint
      description: Version discovery
      operationId: version
      responses:
        '200':
          description: Versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleVersion'
  /v3/auth/projects:
    get:
      tags:
      - auth
      summary: Get available project scopes.
      description: |-
        This call returns the list of projects that are available to be scoped to
        based on the X-Auth-Token provided in the request.
      operationId: list
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectShortList'
  /v3/auth/tokens:
    get:
      tags:
      - auth
      summary: Validate and show information for token.
      description: |-
        Validates and shows information for a token, including its expiration date
        and authorization scope.

        Pass your own token in the X-Auth-Token request header.

        Pass the token that you want to validate in the X-Subject-Token request
        header.
      operationId: show
      parameters:
      - name: nocatalog
        in: query
        description: |-
          The authentication response excludes the service catalog. By default,
          the response includes the service catalog.
        required: false
        schema:
          type:
          - boolean
          - 'null'
      - name: allow_expired
        in: query
        description: |-
          Allow fetching a token that has expired. By default expired tokens
          return a 404 exception.
        required: false
        schema:
          type:
          - boolean
          - 'null'
      responses:
        '200':
          description: Token object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
    post:
      tags:
      - auth
      summary: Authenticate user issuing a new token.
      description: Issue token
      operationId: create
      parameters:
      - name: nocatalog
        in: query
        description: |-
          The authentication response excludes the service catalog. By default,
          the response includes the service catalog.
        required: false
        schema:
          type:
          - boolean
          - 'null'
      responses:
        '200':
          description: Token object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '429':
          description: Rate limit exceeded
    delete:
      tags:
      - auth
      summary: Revoke token.
      description: |-
        Revokes a token.

        This call is similar to the HEAD /auth/tokens call except that the
        `X-Subject-Token` token is immediately not valid, regardless of the
        expires_at attribute value. An additional `X-Auth-Token` is not required.
      operationId: delete
      responses:
        '204':
          description: Token has been revoked.
  /v3/credentials:
    get:
      tags:
      - credentials
      summary: List credentials.
      description: List credentials
      operationId: list
      parameters:
      - name: type
        in: query
        description: Filter by credential type.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: user_id
        in: query
        description: Filter by owning user ID.
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: List of credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialList'
        '500':
          description: Internal error
    post:
      tags:
      - credentials
      summary: Create a new credential.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialCreateRequest'
        required: true
      responses:
        '201':
          description: Credential created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialResponse'
        '400':
          description: Invalid input
        '500':
          description: Internal error
  /v3/credentials/{credential_id}:
    get:
      tags:
      - credentials
      summary: Get single credential.
      description: Get credential by ID
      operationId: show
      parameters:
      - name: credential_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Credential object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialResponse'
        '404':
          description: Credential not found
    delete:
      tags:
      - credentials
      summary: Delete a credential.
      description: Delete credential by ID
      operationId: delete
      parameters:
      - name: credential_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Credential deleted
        '404':
          description: Credential not found
    patch:
      tags:
      - credentials
      summary: Update an existing credential.
      description: Update credential by ID
      operationId: update
      parameters:
      - name: credential_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialUpdateRequest'
        required: true
      responses:
        '200':
          description: Updated credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialResponse'
        '404':
          description: Credential not found
  /v3/domains:
    get:
      tags:
      - domains
      summary: List domains
      description: List domains
      operationId: list
      parameters:
      - name: ids
        in: query
        description: Filter domains by the `id` attribute.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: name
        in: query
        description: Filter domains by the `name` attribute.
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: List of domains
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainList'
        '500':
          description: Internal error
    post:
      tags:
      - domains
      summary: Create domain.
      description: Creates a domain, which is a container for projects and users.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainCreateRequest'
        required: true
      responses:
        '201':
          description: Domain created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainResponse'
        '400':
          description: Invalid input
        '500':
          description: Internal error
  /v3/domains/{domain_id}:
    get:
      tags:
      - domains
      summary: Get single domain
      operationId: show
      parameters:
      - name: domain_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Single domain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainResponse'
        '404':
          description: Domain not found
    delete:
      tags:
      - domains
      summary: Delete domain by ID.
      operationId: remove
      parameters:
      - name: domain_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Deleted
        '404':
          description: Domain not found
  /v3/ec2tokens:
    post:
      tags:
      - ec2tokens
      summary: |-
        Validate the signed `credentials` object and issue a Keystone token
        scoped to the referenced EC2 credential's project/user.
      description: Validate an EC2 request signature and issue a token
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ec2TokenAuthRequest'
        required: true
      responses:
        '200':
          description: Token object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
  /v3/endpoints:
    get:
      tags:
      - endpoints
      summary: List endpoints
      description: List endpoints
      operationId: list
      parameters:
      - name: interface
        in: query
        description: Filters the response by an interface.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: service_id
        in: query
        description: Filters the response by a service ID.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: region_id
        in: query
        description: Filters the response by a region ID.
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: List of endpoints
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointList'
        '500':
          description: Internal error
    post:
      tags:
      - endpoints
      summary: Create a new Endpoint.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndpointCreateRequest'
        required: true
      responses:
        '201':
          description: Endpoint created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointResponse'
        '400':
          description: Invalid input
        '404':
          description: Service not found
        '500':
          description: Internal error
  /v3/endpoints/{endpoint_id}:
    get:
      tags:
      - endpoints
      summary: Get single endpoint
      description: Get endpoint by ID
      operationId: show
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Endpoint object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointResponse'
        '404':
          description: Endpoint not found
    delete:
      tags:
      - endpoints
      summary: Delete an endpoint.
      description: Delete endpoint by ID
      operationId: delete
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Endpoint deleted
        '404':
          description: Endpoint not found
    patch:
      tags:
      - endpoints
      summary: Update existing endpoint
      description: Update endpoint by ID
      operationId: update
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndpointUpdateRequest'
        required: true
      responses:
        '200':
          description: Updated endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointResponse'
        '404':
          description: Endpoint not found
  /v3/groups:
    get:
      tags:
      - groups
      summary: List user groups.
      operationId: list
      parameters:
      - name: domain_id
        in: query
        description: Filter users by Domain ID.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: name
        in: query
        description: Filter users by Name.
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: List of groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupList'
        '500':
          description: Internal error
    post:
      tags:
      - groups
      summary: Create new user group.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
        required: true
      responses:
        '201':
          description: Group object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
  /v3/groups/{group_id}:
    get:
      tags:
      - groups
      summary: Get a single user group by ID.
      operationId: show
      parameters:
      - name: group_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Group object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '404':
          description: Group not found
    delete:
      tags:
      - groups
      summary: Delete group by ID.
      operationId: delete
      parameters:
      - name: group_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Deleted
        '404':
          description: group not found
  /v3/projects:
    get:
      tags:
      - projects
      summary: List projects
      description: List projects
      operationId: list
      parameters:
      - name: domain_id
        in: query
        description: Filter projects by domain ID.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: ids
        in: query
        description: Filter projects by the `id` attribute.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: name
        in: query
        description: Filter projects by name.
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectShortList'
        '500':
          description: Internal error
    post:
      tags:
      - projects
      summary: Create project.
      description: Creates a project, where the project may act as a domain.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
        required: true
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          description: Invalid input
        '500':
          description: Internal error
  /v3/projects/{project_id}:
    get:
      tags:
      - projects
      summary: Get single project
      operationId: show
      parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Single project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '404':
          description: Project not found
    delete:
      tags:
      - projects
      summary: Delete project by ID.
      operationId: remove
      parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Deleted
        '404':
          description: Project not found
  /v3/projects/{project_id}/users/{user_id}/roles:
    get:
      tags:
      - role_assignments
      summary: List the roles that a user has on a project.
      operationId: /project/user/role:list
      parameters:
      - name: project_id
        in: path
        description: The project ID.
        required: true
        schema:
          type: string
      - name: user_id
        in: path
        description: The user ID.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: List of roles
        '404':
          description: User or project not found
      security:
      - x-auth: []
  /v3/projects/{project_id}/users/{user_id}/roles/{role_id}:
    put:
      tags:
      - role_assignments
      summary: Assign role to user on project
      description: Assigns a role to a user on a project.
      operationId: /project/user/role:put
      parameters:
      - name: role_id
        in: path
        description: The role ID.
        required: true
        schema:
          type: string
      - name: project_id
        in: path
        description: The project ID.
        required: true
        schema:
          type: string
      - name: user_id
        in: path
        description: The user ID.
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Grant is created.
        '404':
          description: Grant not found
      security:
      - x-auth: []
    delete:
      tags:
      - role_assignments
      summary: Revoke role from user on project
      description: Remove a role assignment for a user on a specific project.
      operationId: /project/user/role:delete
      parameters:
      - name: role_id
        in: path
        description: The role ID.
        required: true
        schema:
          type: string
      - name: project_id
        in: path
        description: The project ID.
        required: true
        schema:
          type: string
      - name: user_id
        in: path
        description: The user ID.
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Role revoked successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Grant not found
      security:
      - X-Auth-Token: []
    head:
      tags:
      - role_assignments
      summary: Check whether user has role assignment on project.
      description: Validates that a user has a role on a project.
      operationId: /project/user/role:check
      parameters:
      - name: role_id
        in: path
        description: The user ID.
        required: true
        schema:
          type: string
      - name: project_id
        in: path
        description: The project ID.
        required: true
        schema:
          type: string
      - name: user_id
        in: path
        description: The user ID.
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Grant is present.
        '404':
          description: Grant not found
      security:
      - x-auth: []
  /v3/role_assignments:
    get:
      tags:
      - role_assignments
      summary: List role assignments.
      description: List roles
      operationId: list
      parameters:
      - name: scope.domain.id
        in: query
        description: Filters the response by a domain ID.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: group.id
        in: query
        description: Filters the response by a group ID.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: effective
        in: query
        description: |-
          Returns the effective assignments, including any assignments gained by
          virtue of group membership.
        required: false
        schema:
          type:
          - boolean
          - 'null'
      - name: scope.project.id
        in: query
        description: Filters the response by a project ID.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: role.id
        in: query
        description: Filters the response by a role ID.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: user.id
        in: query
        description: Filters the response by a user ID.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: include_names
        in: query
        description: |-
          If set to true, then the names of any entities returned will be include
          as well as their IDs. Any value other than 0 (including no value)
          will be interpreted as true.
        required: false
        schema:
          type:
          - boolean
          - 'null'
      responses:
        '200':
          description: List of role assignments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentList'
        '500':
          description: Internal error
  /v3/role_inferences:
    get:
      tags:
      - roles
      summary: List all role inference rules.
      operationId: /role_inferences:list
      responses:
        '200':
          description: List of all role inference rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleInferencesList'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - x-auth: []
  /v3/roles:
    get:
      tags:
      - roles
      summary: List roles
      description: List roles
      operationId: list
      parameters:
      - name: domain_id
        in: query
        description: Filter users by Domain ID.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: name
        in: query
        description: Filter users by Name.
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: List of roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleList'
        '500':
          description: Internal error
    post:
      tags:
      - roles
      summary: Create a new Role.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreateRequest'
        required: true
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '400':
          description: Invalid input
        '500':
          description: Internal error
  /v3/roles/{prior_role_id}/implies:
    get:
      tags:
      - roles
      summary: List role imply rules for a prior role.
      operationId: /roles/prior_role/implies:list
      parameters:
      - name: prior_role_id
        in: path
        description: The prior role ID.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: List of role imply rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleInferenceRules'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
      - x-auth: []
  /v3/roles/{prior_role_id}/implies/{implied_role_id}:
    get:
      tags:
      - roles
      summary: Get a role imply rule.
      operationId: /roles/prior_role/implies/implied_role:get
      parameters:
      - name: prior_role_id
        in: path
        description: The prior role ID.
        required: true
        schema:
          type: string
      - name: implied_role_id
        in: path
        description: The implied role ID.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Role imply rule details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleImplyResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Role imply rule not found
      security:
      - x-auth: []
    put:
      tags:
      - roles
      summary: Create a role imply rule.
      operationId: /roles/prior_role/implies/implied_role:put
      parameters:
      - name: prior_role_id
        in: path
        description: The prior role ID.
        required: true
        schema:
          type: string
      - name: implied_role_id
        in: path
        description: The implied role ID.
        required: true
        schema:
          type: string
      responses:
        '201':
          description: Role imply rule created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleImplyResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Role not found
      security:
      - x-auth: []
    delete:
      tags:
      - roles
      summary: Delete a role imply rule.
      operationId: /roles/prior_role/implies/implied_role:delete
      parameters:
      - name: prior_role_id
        in: path
        description: The prior role ID.
        required: true
        schema:
          type: string
      - name: implied_role_id
        in: path
        description: The implied role ID.
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Role imply rule deleted.
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Role not found
      security:
      - x-auth: []
    head:
      tags:
      - roles
      summary: Check if a role imply rule exists.
      operationId: /roles/prior_role/implies/implied_role:check
      parameters:
      - name: prior_role_id
        in: path
        description: The prior role ID.
        required: true
        schema:
          type: string
      - name: implied_role_id
        in: path
        description: The implied role ID.
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Role imply rule exists.
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
