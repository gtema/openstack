        in: path
        description: Domain ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: JTI revocation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksRevocationResponse'
        '429':
          description: Rate limit exceeded
