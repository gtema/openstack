      properties:
        implies:
          $ref: '#/components/schemas/RoleRef'
          description: The role that is implied by the prior role.
        prior_role:
          $ref: '#/components/schemas/RoleRef'
          description: The prior role that implies another role.
    RoleImplyResponse:
