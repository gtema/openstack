            - after
      - type: object
        description: Insert before the rule with the given name.
        required:
        - anchor
        - type
        properties:
          anchor:
            type: string
            description: Name of the existing rule to anchor to.
          type:
            type: string
            enum:
            - before
      description: Rule position for insert operations.
