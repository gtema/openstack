        required: true
      responses:
        '200':
          description: Authentication Token object
          headers:
            x-subject-token:
              schema:
                type: string
              description: Keystone token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      security:
      - oauth2:
        - openid
