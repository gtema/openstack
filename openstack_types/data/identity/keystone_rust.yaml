    post:
      tags:
      - identity_providers
      operationId: /federation/identity_provider/jwt:login
      parameters:
      - name: openstack-mapping
        in: header
        description: Rule name hint for targeted rule matching
        required: true
        schema:
          type: string
      - name: idp_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Authentication Token object
          headers:
            x-subject-token:
              schema:
                type: string
              description: Keystone token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      security:
      - jwt: []
  /v4/federation/oidc/callback:
    post:
      tags:
      - identity_providers
      operationId: federation/oidc/callback
      requestBody:
        content:
          application/json:
            schema:
