    ExtensionShowResponse:
      additionalProperties: false
      properties:
        extension:
          additionalProperties: false
          description: |-
            An `extension` object.
          properties:
            alias:
              description: |-
                A short name by which this extension is also known.
              type: string
            description:
              description: |-
                Text describing this extension’s purpose.
              type: string
            links:
              description: |-
                Links pertaining to this extension. This is a list of dictionaries, each including
                keys `href` and `rel`.
              items:
                properties:
                  href:
                    format: url
                    type: string
                  rel:
                    type: string
                type: object
              type: array
            name:
              description: |-
                Name of the extension.
              type: string
            namespace:
              description: |-
                A URL pointing to the namespace for this extension.
              type: string
            updated:
              description: |-
                The date and time when the resource was updated. The date and time
                stamp format is [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601)

                ```
                CCYY-MM-DDThh:mm:ss±hh:mm
                ```

                For example, `2015-08-27T09:49:58-05:00`. The `±hh:mm`
                value, if included, is the time zone as an offset from UTC. In
                the previous example, the offset value is `-05:00`.
              format: date-time
              type: string
          required:
            - alias
            - description
            - links
            - name
            - namespace
            - updated
          type: object
      required:
        - extension
      type: object
    ExtensionsIndexResponse:
      additionalProperties: false
      properties:
        extensions:
          description: |-
            List of `extension` objects.
          items:
            additionalProperties: false
            properties:
              alias:
                description: |-
                  A short name by which this extension is also known.
                type: string
              description:
                description: |-
                  Text describing this extension’s purpose.
                type: string
              links:
