openapi: 3.1.0
info:
  description: |-
    This is a reference for the OpenStack Compute API which is provided by the Nova
    project. To learn more about the OpenStack Compute API concepts, please refer to
    the [API guide](https://docs.openstack.org/api-guide/compute/index.html).
  title: OpenStack Compute API
  version: '2.103'
paths:
  /v2.1/:
    get:
      description: |-
        This fetches all the information about all known major API versions in
        the deployment. Links to more specific information will be provided
        for each API version, as well as information about supported min and
        max microversions.

        Normal Response Codes: 200
      operationId: :get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootShowResponse'
          description: Ok
      summary: List All Major Versions
      tags:
        - version
  /v2.1/extensions:
    get:
      description: |-
        Lists all extensions to the API.

        Normal response codes: 200

        Error response codes: unauthorized(401)
      operationId: extensions:get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionsIndexResponse'
          description: Ok
      summary: List Extensions
      tags:
        - extensions
  /v2.1/extensions/{id}:
    get:
      description: |-
        Shows details for an extension, by alias.

        Normal response codes: 200

        Error response codes: unauthorized(401), itemNotFound(404)
      operationId: extensions/id:get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionShowResponse'
          description: Ok
      summary: Show Extension Details
      tags:
        - extensions
    parameters:
      - $ref: '#/components/parameters/extensions_id'
  /v2.1/flavors:
    get:
      description: |-
        Lists all flavors accessible to your project.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403)
      operationId: flavors:get
      parameters:
        - $ref: '#/components/parameters/flavors_is_public'
        - $ref: '#/components/parameters/flavors_limit'
        - $ref: '#/components/parameters/flavors_marker'
        - $ref: '#/components/parameters/flavors_minDisk'
        - $ref: '#/components/parameters/flavors_minRam'
        - $ref: '#/components/parameters/flavors_name'
        - $ref: '#/components/parameters/flavors_sort_dir'
        - $ref: '#/components/parameters/flavors_sort_key'
      responses:
        '200':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FlavorsIndexResponse_20'
                  - $ref: '#/components/schemas/FlavorsIndexResponse_255'
          description: Ok
      summary: List Flavors
      tags:
        - flavors
    post:
      description: |-
        Creates a flavor.

        Creating a flavor is typically only available to administrators of a
        cloud because this has implications for scheduling efficiently in the cloud.

        Normal response codes: 200

        Error response codes: badRequest(400), unauthorized(401), forbidden(403),
        conflict(409)
      operationId: flavors:post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlavorsCreateRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FlavorsCreateResponse_20'
                  - $ref: '#/components/schemas/FlavorsCreateResponse_2102'
                  - $ref: '#/components/schemas/FlavorsCreateResponse_255'
                  - $ref: '#/components/schemas/FlavorsCreateResponse_261'
                  - $ref: '#/components/schemas/FlavorsCreateResponse_275'
          description: Ok
        '400':
          description: Error
        '409':
          description: Error
      summary: Create Flavor
      tags:
        - flavors
  /v2.1/flavors/detail:
    get:
      description: |-
        Lists flavors with details.

        Normal response codes: 200

        Error response codes: badRequest(400), unauthorized(401), forbidden(403)
      operationId: flavors/detail:get
      parameters:
        - $ref: '#/components/parameters/flavors_detail_is_public'
        - $ref: '#/components/parameters/flavors_detail_limit'
        - $ref: '#/components/parameters/flavors_detail_marker'
        - $ref: '#/components/parameters/flavors_detail_minDisk'
        - $ref: '#/components/parameters/flavors_detail_minRam'
        - $ref: '#/components/parameters/flavors_detail_name'
        - $ref: '#/components/parameters/flavors_detail_sort_dir'
        - $ref: '#/components/parameters/flavors_detail_sort_key'
      responses:
        '200':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FlavorsDetailDetailResponse_20'
                  - $ref: '#/components/schemas/FlavorsDetailDetailResponse_2102'
                  - $ref: '#/components/schemas/FlavorsDetailDetailResponse_255'
                  - $ref: '#/components/schemas/FlavorsDetailDetailResponse_261'
          description: Ok
      summary: List Flavors With Details
      tags:
        - flavors
  /v2.1/flavors/{flavor_id}/os-extra_specs:
    get:
      description: |-
        Lists all extra specs for a flavor, by ID.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: flavors/flavor_id/os-extra_specs:get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlavorsOs_Extra_SpecsIndexResponse'
          description: Ok
      summary: List Extra Specs For A Flavor
      tags:
        - flavors
    parameters:
      - $ref: '#/components/parameters/flavors_os_extra_specs_flavor_id'
    post:
      description: |-
        Creates extra specs for a flavor, by ID.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404),
        conflict(409)
      operationId: flavors/flavor_id/os-extra_specs:post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlavorsOs_Extra_SpecsCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlavorsOs_Extra_SpecsCreateResponse'
          description: Ok
        '400':
          description: Error
        '404':
          description: Error
        '409':
          description: Error
      summary: Create Extra Specs For A Flavor
      tags:
        - flavors
  /v2.1/flavors/{flavor_id}/os-extra_specs/{id}:
    delete:
      description: |-
        Deletes an extra spec, by key, for a flavor, by ID.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: flavors/flavor_id/os-extra_specs/id:delete
      responses:
        '204':
          description: Ok
      summary: Delete An Extra Spec For A Flavor
      tags:
        - flavors
    get:
      description: |-
        Shows an extra spec, by key, for a flavor, by ID.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: flavors/flavor_id/os-extra_specs/id:get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlavorsOs_Extra_SpecShowResponse'
          description: Ok
      summary: Show An Extra Spec For A Flavor
      tags:
        - flavors
    parameters:
      - $ref: '#/components/parameters/flavors_os_extra_specs_flavor_id'
      - $ref: '#/components/parameters/flavors_os_extra_specs_id'
    put:
      description: |-
        Updates an extra spec, by key, for a flavor, by ID.

        Normal response codes: 200

        Error response codes: badRequest(400), unauthorized(401), forbidden(403)
        itemNotFound(404), conflict(409)
      operationId: flavors/flavor_id/os-extra_specs/id:put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlavorsOs_Extra_SpecUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlavorsOs_Extra_SpecUpdateResponse'
          description: Ok
        '400':
          description: Error
        '404':
          description: Error
        '409':
          description: Error
      summary: Update An Extra Spec For A Flavor
      tags:
        - flavors
  /v2.1/flavors/{flavor_id}/os-flavor-access:
    get:
      description: |-
        Lists flavor access information.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: flavors/flavor_id/os-flavor-access:get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlavorsOs_Flavor_AccessIndexResponse'
          description: Ok
      summary: List Flavor Access Information For Given Flavor
      tags:
        - flavors
    parameters:
      - $ref: '#/components/parameters/flavors_os_flavor_access_flavor_id'
  /v2.1/flavors/{id}:
    delete:
      description: |-
        Deletes a flavor.

        This is typically an admin only action. Deleting a flavor that is in use by
        existing servers is not recommended as it can cause incorrect data to
        be returned to the user under some operations.

        Normal response codes: 202

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: flavors/id:delete
      responses:
        '204':
          description: Ok
      summary: Delete Flavor
      tags:
        - flavors
    get:
      description: |-
        Shows details for a flavor.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: flavors/id:get
      responses:
        '200':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FlavorShowResponse_20'
                  - $ref: '#/components/schemas/FlavorShowResponse_2102'
                  - $ref: '#/components/schemas/FlavorShowResponse_255'
                  - $ref: '#/components/schemas/FlavorShowResponse_261'
                  - $ref: '#/components/schemas/FlavorShowResponse_275'
          description: Ok
      summary: Show Flavor Details
      tags:
        - flavors
    parameters:
      - $ref: '#/components/parameters/flavors_id'
    put:
      description: |-
        Updates a flavor description.

        This API is available starting with microversion 2.55.

        Policy defaults enable only users with the administrative role to
        perform this operation. Cloud providers can change these permissions
        through the `policy.yaml` file.

        Normal response codes: 200

        Error response codes: badRequest(400), unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: flavors/id:put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlavorUpdate_255'
      responses:
        '200':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FlavorUpdateResponse_2102'
                  - $ref: '#/components/schemas/FlavorUpdateResponse_255'
                  - $ref: '#/components/schemas/FlavorUpdateResponse_261'
                  - $ref: '#/components/schemas/FlavorUpdateResponse_275'
          description: Ok
        '400':
          description: Error
        '404':
          description: Error
      summary: Update Flavor Description
      tags:
        - flavors
      x-openstack:
        min-ver: '2.55'
  /v2.1/flavors/{id}/action:
    parameters:
      - $ref: '#/components/parameters/flavors_action_id'
    post:
      operationId: flavors/id/action:post
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/FlavorsAction_Add_Tenant_Access'
                - $ref: '#/components/schemas/FlavorsAction_Remove_Tenant_Access'
              x-openstack:
                discriminator: action
      responses:
        '201':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FlavorsAction_Add_Tenant_AccessResponse'
                  - $ref: '#/components/schemas/FlavorsAction_Remove_Tenant_AccessResponse'
          description: Ok
        '400':
          description: Error
        '403':
          description: Error
        '404':
          description: Error
        '409':
          description: Error
      tags:
        - flavors
  /v2.1/images:
    get:
      deprecated: true
      description: |-
        List images.

        Normal response codes: 200

        Error response codes: badRequest(400), unauthorized(401), forbidden(403)
      operationId: images:get
      parameters:
        - $ref: '#/components/parameters/images_changes-since'
        - $ref: '#/components/parameters/images_limit'
        - $ref: '#/components/parameters/images_marker'
        - $ref: '#/components/parameters/images_minDisk'
        - $ref: '#/components/parameters/images_minRam'
        - $ref: '#/components/parameters/images_name'
        - $ref: '#/components/parameters/images_offset'
        - $ref: '#/components/parameters/images_page_size'
        - $ref: '#/components/parameters/images_server'
        - $ref: '#/components/parameters/images_status'
        - $ref: '#/components/parameters/images_type'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagesIndexResponse_21'
          description: Ok
      summary: List Images
      tags:
        - images
      x-openstack:
        max-ver: '2.35'
        min-ver: '2.1'
  /v2.1/images/detail:
    get:
      deprecated: true
      description: |-
        List images with details.

        Normal response codes: 200

        Error response codes: badRequest(400), unauthorized(401), forbidden(403)
      operationId: images/detail:get
      parameters:
        - $ref: '#/components/parameters/images_detail_changes-since'
        - $ref: '#/components/parameters/images_detail_limit'
        - $ref: '#/components/parameters/images_detail_marker'
        - $ref: '#/components/parameters/images_detail_minDisk'
        - $ref: '#/components/parameters/images_detail_minRam'
        - $ref: '#/components/parameters/images_detail_name'
        - $ref: '#/components/parameters/images_detail_offset'
        - $ref: '#/components/parameters/images_detail_page_size'
        - $ref: '#/components/parameters/images_detail_server'
        - $ref: '#/components/parameters/images_detail_status'
        - $ref: '#/components/parameters/images_detail_type'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagesDetailDetailResponse_21'
          description: Ok
      summary: List Images With Details
      tags:
        - images
      x-openstack:
        max-ver: '2.35'
        min-ver: '2.1'
  /v2.1/images/{id}:
    delete:
      deprecated: true
      description: |-
        Deletes an image.

        Normal response codes: 204

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: images/id:delete
      responses:
        '204':
          description: Ok
        '403':
          description: Error
        '404':
          description: Error
      summary: Delete Image
      tags:
        - images
      x-openstack:
        max-ver: '2.35'
        min-ver: '2.1'
    get:
      deprecated: true
      description: |-
        Shows details for an image.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: images/id:get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageShowResponse_21'
          description: Ok
      summary: Show Image Details
      tags:
        - images
      x-openstack:
        max-ver: '2.35'
        min-ver: '2.1'
    parameters:
      - $ref: '#/components/parameters/images_id'
  /v2.1/images/{image_id}/metadata:
    get:
      deprecated: true
      description: |-
        List metadata of an image.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: images/image_id/metadata:get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagesMetadataIndexResponse_21'
          description: Ok
        '403':
          description: Error
        '404':
          description: Error
      summary: List Image Metadata
      tags:
        - images
      x-openstack:
        max-ver: '2.38'
        min-ver: '2.1'
    parameters:
      - $ref: '#/components/parameters/images_metadata_image_id'
    post:
      deprecated: true
      description: |-
        Create an image metadata.

        Normal response codes: 200

        Error response codes: badRequest(400), unauthorized(401), forbidden(403),
        itemNotFound(404)
      operationId: images/image_id/metadata:post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImagesMetadataCreate_21'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagesMetadataCreateResponse_21'
          description: Ok
        '400':
          description: Error
        '403':
          description: Error
        '404':
          description: Error
      summary: Create Image Metadata
      tags:
        - images
      x-openstack:
        max-ver: '2.38'
        min-ver: '2.1'
    put:
      deprecated: true
      description: |-
        Update an image metadata

        Normal response codes: 200

        Error response codes: badRequest(400), unauthorized(401), forbidden(403),
        itemNotFound(404)
      operationId: images/image_id/metadata:put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImagesMetadataUpdate_All_21'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagesMetadataUpdate_AllResponse_21'
          description: Ok
        '400':
          description: Error
        '403':
          description: Error
        '404':
          description: Error
      summary: Update Image Metadata
      tags:
        - images
      x-openstack:
        max-ver: '2.38'
        min-ver: '2.1'
  /v2.1/images/{image_id}/metadata/{id}:
    delete:
      deprecated: true
      description: |-
        Deletes a metadata item, by key, for an image.

        Normal response codes: 204

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: images/image_id/metadata/id:delete
      responses:
        '204':
          description: Ok
        '403':
          description: Error
        '404':
          description: Error
      summary: Delete Image Metadata Item
      tags:
        - images
      x-openstack:
        max-ver: '2.38'
        min-ver: '2.1'
    get:
      deprecated: true
      description: |-
        Shows metadata item, by key, for an image.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: images/image_id/metadata/id:get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagesMetadataShowResponse_21'
          description: Ok
        '403':
          description: Error
        '404':
          description: Error
      summary: Show Image Metadata Item
      tags:
        - images
      x-openstack:
        max-ver: '2.38'
        min-ver: '2.1'
    parameters:
      - $ref: '#/components/parameters/images_metadata_id'
      - $ref: '#/components/parameters/images_metadata_image_id'
    put:
      deprecated: true
      description: |-
        Creates or updates a metadata item, by key, for an image.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: images/image_id/metadata/id:put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImagesMetadataUpdate_21'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagesMetadataUpdateResponse_21'
          description: Ok
        '400':
          description: Error
        '403':
          description: Error
        '404':
          description: Error
      summary: Create Or Update Image Metadata Item
      tags:
        - images
      x-openstack:
        max-ver: '2.38'
        min-ver: '2.1'
  /v2.1/limits:
    get:
      description: |-
        Shows rate and absolute limits for the project.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403)
      operationId: limits:get
      parameters:
        - $ref: '#/components/parameters/limits_tenant_id'
      responses:
        '200':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LimitsIndexResponse_21'
                  - $ref: '#/components/schemas/LimitsIndexResponse_236'
                  - $ref: '#/components/schemas/LimitsIndexResponse_239'
                  - $ref: '#/components/schemas/LimitsIndexResponse_257'
          description: Ok
      summary: Show Rate And Absolute Limits
      tags:
        - limits
  /v2.1/os-agents:
    get:
      description: |-
        Lists agent builds.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403), gone(410)
      operationId: os-agents:get
      responses:
        '200':
          description: Ok
      summary: List Agent Builds
      tags:
        - os-agents
    post:
      description: |-
        Creates an agent build.

        Normal response codes: 200

        Error response codes: badRequest(400), unauthorized(401), forbidden(403),
        conflict(409), gone(410)
      operationId: os-agents:post
      responses:
        '201':
          description: Ok
      summary: Create Agent Build
      tags:
        - os-agents
  /v2.1/os-agents/{id}:
    delete:
      description: |-
        Deletes an existing agent build.

        Normal response codes: 200

        Error response codes: badRequest(400), unauthorized(401), forbidden(403),
        itemNotFound(404), gone(410)
      operationId: os-agents/id:delete
      responses:
        '204':
          description: Ok
      summary: Delete Agent Build
      tags:
        - os-agents
    parameters:
      - $ref: '#/components/parameters/os_agents_id'
    put:
      description: |-
        Updates an agent build.

        Normal response codes: 200

        Error response codes: badRequest(400), unauthorized(401), forbidden(403),
        itemNotFound(404), gone(410)
      operationId: os-agents/id:put
      responses:
        '200':
          description: Ok
      summary: Update Agent Build
      tags:
        - os-agents
  /v2.1/os-aggregates:
    get:
      description: |-
        Lists all aggregates. Includes the ID, name, and availability zone for each aggregate.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403)
      operationId: os-aggregates:get
      responses:
        '200':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Os_AggregatesIndexResponse_21'
                  - $ref: '#/components/schemas/Os_AggregatesIndexResponse_241'
          description: Ok
      summary: List Aggregates
      tags:
        - os-aggregates
    post:
      description: |-
        Creates an aggregate. If specifying an option availability_zone, the aggregate is
        created as an availability zone and the availability zone is visible to normal users.

        Normal response codes: 200

        Error response codes: badRequest(400), unauthorized(401), forbidden(403), conflict(409)
      operationId: os-aggregates:post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Os_AggregatesCreateRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Os_AggregatesCreateResponse_21'
                  - $ref: '#/components/schemas/Os_AggregatesCreateResponse_241'
          description: Ok
        '400':
          description: Error
        '409':
          description: Error
      summary: Create Aggregate
      tags:
        - os-aggregates
  /v2.1/os-aggregates/{id}:
    delete:
      description: |-
        Deletes an aggregate.

        Normal response codes: 200

        Error response codes: badRequest(400), unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: os-aggregates/id:delete
      responses:
        '204':
          description: Ok
        '400':
          description: Error
        '404':
          description: Error
      summary: Delete Aggregate
      tags:
        - os-aggregates
    get:
      description: |-
        Shows details for an aggregate. Details include hosts and metadata.

        Normal response codes: 200

        Error response codes: unauthorized(401), forbidden(403), itemNotFound(404)
      operationId: os-aggregates/id:get
      responses:
        '200':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Os_AggregateShowResponse_21'
                  - $ref: '#/components/schemas/Os_AggregateShowResponse_241'
          description: Ok
        '400':
          description: Error
        '404':
          description: Error
      summary: Show Aggregate Details
      tags:
        - os-aggregates
    parameters:
      - $ref: '#/components/parameters/os_aggregates_id'
    put:
      description: |-
