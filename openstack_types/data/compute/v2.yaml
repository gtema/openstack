                - false
                - 'False'
                - NO
                - No
                - OFF
                - ON
                - Off
                - On
                - 'TRUE'
                - true
                - 'True'
                - YES
                - Yes
                - 'false'
                - no
                - off
                - on
                - 'true'
                - yes
