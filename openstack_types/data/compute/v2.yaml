      properties:
        addTenantAccess:
          additionalProperties: false
          description: |-
            The action.
          properties:
            tenant:
              description: |-
                The UUID of the tenant in a multi-tenancy cloud.
              maxLength: 255
              minLength: 1
              type: string
          required:
            - tenant
          type: object
      required:
        - addTenantAccess
      summary: Add Flavor Access To Tenant (addTenantAccess Action)
      type: object
      x-openstack:
        action-name: addTenantAccess
    FlavorsAction_Add_Tenant_AccessResponse:
      additionalProperties: true
      properties:
        flavor_access:
          description: |-
            A list of objects, each with the keys `flavor_id` and `tenant_id`.
          items:
            additionalProperties: true
            properties:
              flavor_id:
                description: |-
                  The ID of the flavor. While people often make this look like
                  an int, this is really a string.
                type: string
              tenant_id:
                description: |-
                  The UUID of the tenant in a multi-tenancy cloud.
                maxLength: 255
                minLength: 1
                pattern: ^[a-zA-Z0-9-]*$
                type: string
            required:
