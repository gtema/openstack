                **Available until version 2.87**
              type: integer
          required:
            - cpu_info
            - current_workload
            - free_disk_gb
            - free_ram_mb
            - host_ip
            - hypervisor_hostname
            - hypervisor_type
            - hypervisor_version
            - id
