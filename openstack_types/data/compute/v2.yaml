              patternProperties:
                ^.+$:
                  type: string
              type: object
            name:
              description: |-
                The server name.
              type:
                - 'null'
                - string
            os-extended-volumes:volumes_attached:
              description: |-
                The attached volumes, if any.
              items:
                additionalProperties: false
                properties:
                  id:
                    type: string
                required:
                  - id
                type: object
              type: array
            progress:
              description: |-
                A percentage value of the operation progress.
                This parameter only appears when the server status is `ACTIVE`,
