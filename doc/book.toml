[book]
authors = ["gtema"]
language = "en"
src = "src"
title = "OpenStack Client Tools"

[rust]
edition = "2024"

[build]
build-dir = "html"
create-missing = false

[output.html.fold]
enable = true
level = 2

[preprocessor.osc-cli]
command = "cargo run -p xtask --bin osc-cli-md"

[preprocessor.config-schema-md]
command = "cargo run -p xtask --bin config-schema-md"
